; MIIIME Hybrid Launcher Configuration Guide
; ⓒ 2026 MIIIME

; 이 파일은 ANSI 인코딩으로 저장되어야 함.
; This file must be saved in ANSI encoding.

[Launch]
CrashRecovery=1
RunAsAdmin=0
LauncherName=Catsxp MIIIME Launcher
AppName=Catsxp
ExeName=catsxp.exe
ExeName64=catsxp.exe
UniqueMutex=Catsxp_MIIIME_Mutex
AllowMultipleInstances=1
WorkDir=
PreRun=
PostRun=

[Directories]
RunPath=App\Catsxp-Browser\Application
RawDataPath=App\RawDat
ExtPath=App\Ext
DataPath=Dat

[Environment]
;PATH01={Sys}\System32
;PATH02={Sys}\SysWOW64
;PATH01={Base}\..\_MIIIMEEnv\System32
;PATH02={Base}\..\_MIIIMEEnv\SysWOW64

[Options]
UseJunction=1
FreezeMode=0
DetectReadOnly=0
LogLevel=0
AddCommand=--user-data-dir="{Dat}\User Data" --disk-cache-dir="{Dat}\Cache" --no-first-run --no-default-browser-check --disable-crash-reporter --enable-features=PasswordImport --enable-tab-audio-muting

[ProcessWatch]
01=chrome_proxy.exe
02=platform_experience_helper.exe
03=chrome_pwa_launcher.exe
04=elevated_tracing_service.exe
05=elevation_service.exe
06=notification_helper.exe
07=os_update_handler.exe
08=chrmstp.exe
09=setup.exe
10=GoogleUpdate.exe
11=chromedriver.exe
12=catsxp.exe
13=CatsxpUpdate.exe
14=CatsxpUpdateBroker.exe
15=CatsxpUpdateOnDemand.exe

[Registry]
; --- [User Profile Data] ---
; 사용자 설정 및 브라우저 데이터, 업데이트 상태 정보 (HKCU)
01=HKEY_CURRENT_USER\SOFTWARE\CatsxpSoftware

; --- [System Software Data] ---
; 시스템 레벨의 설치 정보 및 업데이트 클라이언트 (HKLM & WOW64)
02=HKEY_LOCAL_MACHINE\SOFTWARE\CatsxpSoftware
03=HKEY_LOCAL_MACHINE\SOFTWARE\WOW6432Node\CatsxpSoftware

; --- [Browser Integration] ---
; 시작 메뉴 및 기본 브라우저 등록 정보
04=HKEY_LOCAL_MACHINE\SOFTWARE\Clients\StartMenuInternet\Catsxp
05=HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\App Paths\catsxp.exe
06=HKEY_LOCAL_MACHINE\SOFTWARE\RegisteredApplications|Catsxp

; --- [File Associations (Classes)] ---
; HTML, PDF 등 파일 연결 설정
07=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\CatsxpFile
08=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\CatsxpHTML
09=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\CatsxpPDF
10=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\.htm\OpenWithProgIds|CatsxpHTML
11=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\.html\OpenWithProgIds|CatsxpHTML
12=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\.pdf\OpenWithProgids|CatsxpFile

; --- [Background Services] ---
; 업데이트 및 권한 상승 서비스 (좀비 프로세스 방지용 필수 삭제 대상)
13=HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\CatsxpElevationService
14=HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\catsxp
15=HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\catsxpm

; --- [] ---
16=HKEY_USERS\SOFTWARE\CatsxpSoftware\Chrome
17=HKEY_USERS\SOFTWARE\CatsxpSoftware\Update

[RegistryRoot]
; 런처 종료 시 아래 경로가 비어있으면 폴더 자체를 삭제합니다.
01=HKEY_CURRENT_USER\SOFTWARE\CatsxpSoftware
02=HKEY_LOCAL_MACHINE\SOFTWARE\CatsxpSoftware
03=HKEY_LOCAL_MACHINE\SOFTWARE\WOW6432Node\CatsxpSoftware
04=HKEY_LOCAL_MACHINE\SOFTWARE\Clients\StartMenuInternet
05=HKEY_CURRENT_USER\SOFTWARE\Policies\Google
06=HKEY_USERS\SOFTWARE\CatsxpSoftware

[CleanupExclude]
SmartSkip=2

01={Dat}\User Data\Default

; ── [필수] 보안 및 인터페이스 설정 (툴바 아이콘 고정 및 익스텐션 권한) ──
02={Dat}\User Data\Default\Preferences
03={Dat}\User Data\Default\Secure Preferences
04={Dat}\User Data\Default\PreferredApps
05={Dat}\User Data\Default\Web Data
06={Dat}\User Data\Default\Web Data-journal

; ── [필수] 익스텐션 데이터 (설정값 보존 핵심) ──
07={Dat}\User Data\Default\Extensions
08={Dat}\User Data\Default\Extension Rules
09={Dat}\User Data\Default\Extension State
10={Dat}\User Data\Default\Extension Scripts
11={Dat}\User Data\Default\Local Extension Settings
12={Dat}\User Data\Default\Sync Extension Settings
13={Dat}\User Data\Default\Managed Extension Storage
14={Dat}\User Data\Default\DNR Extension Rules

; ── [필수] 웹 저장소 (익스텐션 내부 설정값이 여기에 저장되는 경우가 많음) ──
15={Dat}\User Data\Default\Local Storage
16={Dat}\User Data\Default\Session Storage
17={Dat}\User Data\Default\IndexedDB
18={Dat}\User Data\Default\Databases

; ── [필수] 사용자 데이터 (북마크, 계정, 방문 기록) ──
19={Dat}\User Data\Default\Bookmarks
20={Dat}\User Data\Default\Bookmarks.bak
21={Dat}\User Data\Default\Login Data
22={Dat}\User Data\Default\Login Data For Account
23={Dat}\User Data\Default\History
24={Dat}\User Data\Default\History-journal
25={Dat}\User Data\Default\Favicons
26={Dat}\User Data\Default\Favicons-journal

; ── [필수] 보관 시 탭 및 세션 유지 ──
27={Dat}\User Data\Default\Sessions
28={Dat}\User Data\Default\Session Storage

; ── [필수] 기타 UI 데이터 ──
29={Dat}\User Data\Default\Shortcuts
30={Dat}\User Data\Default\Visited Links
31={Dat}\User Data\Default\Network Action Predictor
32={Dat}\User Data\Default\Site Characteristics Database
33={Dat}\User Data\Default\Sync Data

34={Dat}\User Data\Default\Network

35={Dat}\User Data\First Run
36={Dat}\User Data\Last Browser
37={Dat}\User Data\Last Version
38={Dat}\User Data\Local State
39={Dat}\User Data\Variations

40={Dat}\User Data
41={Dat}\Reg
42={Dat}\State.ini

[CleanupDelete]
SmartSkip=2

01={Programs}\Catsxp.lnk
02={StartMenu}\Catsxp.lnk
03={CommonPrograms}\Catsxp.lnk
04={CommonStartMenu}\Catsxp.lnk
05={Desktop}\Catsxp.lnk

[Assets]
AlwaysUpdate=0
01=*|{Run}

[Resources]
SmartSkip=1
FolderIcon={Res}\Folder.ico
;Splash={Res}\Splash.png
;SplashDuration=1500

[Advanced]
RetryLimit=10
RetryDelay=50
CleanupWait=50
ProcessCheckInterval=200
SystemFolderExclusions=|Microsoft|Windows|Packages|Boot|PerfLogs|
CleanupFolderExclusions=|Microsoft|Windows|Packages|Boot|PerfLogs|
ExitThreshold=2
LogRotationSize=5242880
GuidTrimLen=1
MinOSBuild=0
