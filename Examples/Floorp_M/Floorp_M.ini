; 이 파일은 ANSI 인코딩으로 저장되어야 함.
; This file must be saved in ANSI encoding.

[Launch]
CrashRecovery=0
RunAsAdmin=0
LauncherName=Floorp MIIIME Launcher
AppName=Floorp
ExeName=floorp.exe
ExeName64=
UniqueMutex=Floorp_MIIIME_Mutex
AllowMultipleInstances=0
WorkDir=
PreRun=
PostRun=

[Directories]
RunPath=App\Floorp
RawDataPath=App\RawDat
ExtPath=App\Ext
DataPath=Dat

[Environment]
PATH01={Sys}\System32
PATH02={Sys}\SysWOW64

[Options]
UseJunction=1
FreezeMode=0
DetectReadOnly=0
LogLevel=0
; Firefox가 {Dat}\profile 폴더를 프로필 경로로 직접 사용하도록 설정
; -profile      : 프로필 경로 직접 지정
; -no-deelevate : 관리자 권한 실행 시 권한 강등 방지 (드래그&드롭 오류 방지)
; -no-remote    : 실행 중인 다른 Firefox 인스턴스와 독립적으로 실행
; 바로가기 자동 생성 방지는 커맨드라인 불가 -> [Assets]의 user.js로 처리
AddCommand=-profile "{Dat}\profile" -no-deelevate -no-remote

[ProcessWatch]
01=crashhelper.exe
02=crashreporter.exe
03=default-browser-agent.exe
04=maintenanceservicemaintenanceservice.exe
05=maintenanceservice_installer.exe
06=nmhproxy.exe
07=pingsender.exe
08=plugin-container.exe
09=private_browsing.exe
10=updater.exe
11=desktop-launcher.exe
12=helper.exe

[Registry]
01=HKEY_CURRENT_USER\SOFTWARE\Mozilla
02=HKEY_CURRENT_USER\SOFTWARE\Ablaze
03=HKEY_CURRENT_USER\SOFTWARE\Floorp

[FileWrite]
SmartSkip=1

; ==============================================================================
; [KEY: 방식 - 키 기반 자동 치환]
; 형식: 파일경로|KEY:키이름|바꿀값
;
; prefs.js 처럼  user_pref("키이름", "값");  구조의 파일 전용입니다.
; 키 이름만 지정하면 기존 값이 무엇이든 새 값으로 자동 교체합니다.
; 이전 경로를 몰라도 되므로, PC를 옮겨도 항상 정상 작동합니다.
;
; {Desktop_JS} : prefs.js 형식에 맞는 바탕화면 경로
;                역슬래시를 자동으로 이중(\\)으로 변환합니다.
;                예시 결과: C:\\Users\\홍길동\\Desktop
; ==============================================================================

; [다운로드 기본 저장 위치를 현재 PC의 바탕화면으로 자동 설정]
; prefs.js 안의 browser.download.dir 키를 찾아 값만 교체합니다.
; PC가 달라지거나 사용자명이 바뀌어도 자동으로 올바른 경로가 적용됩니다.
01={Dat}\profile\prefs.js|Key:browser.download.dir|{Desktop}

; [마지막으로 사용한 저장 경로도 함께 초기화 (선택 사항)]
; 필요 시 아래 줄의 맨 앞 세미콜론(;)을 제거하여 활성화하세요.
;02={Dat}\profile\prefs.js|Key:browser.download.lastDir|{Desktop}

; ==============================================================================
; [유형 A 방식 - 시작 메뉴 바로가기 자동 생성 방지]
; prefs.js에 해당 항목이 없으면 추가, 이미 있으면 스킵합니다.
; 찾을 문자열 = 바꿀 문자열로 지정 → "없으면 추가, 있으면 스킵" 동작
; SmartSkip=0 이므로 매 실행마다 확인하지만, 이미 있으면 즉시 스킵합니다.
; ==============================================================================
;
; [방법 선택]
; 아래 두 방법 중 하나를 선택하세요. 동시에 사용하지 마세요.
;
; [방법 1] FileWrite 유형 A (prefs.js 직접 패치) - 파일 1개, 별도 준비물 없음
; 주의: ;(세미콜론)은 INI 값 내부에서 주석이 아니므로 그대로 사용합니다.
;       ""로 감싸면 " 자체가 찾을 문자열에 포함되어 매칭 실패합니다.
03={Dat}\profile\prefs.js|user_pref("browser.shell.checkDefaultBrowser", false);|user_pref("browser.shell.checkDefaultBrowser", false);
04={Dat}\profile\prefs.js|user_pref("browser.shell.didSkipDefaultBrowserCheckOnFirstRun", true);|user_pref("browser.shell.didSkipDefaultBrowserCheckOnFirstRun", true);
;
; [방법 2] Assets + user.js 파일 복사 - App\Ext\Ast\profile\user.js 를 미리 준비해야 함
;          [Assets] 섹션의 01=profile\user.js|{Dat}\profile\user.js 와 함께 사용
;          AlwaysUpdate=0 으로 설정하면 최초 1회만 복사됩니다.

[CleanupExclude]
SmartSkip=2

