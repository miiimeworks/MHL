; 이 파일은 ANSI 인코딩으로 저장되어야 함.
; This file must be saved in ANSI encoding.

; 가이드 파일임. 실제 사용 시 파일명을 TargetApp_M.ini 형식으로 변경할 것.
; This is a guide file. Rename it to match your launcher (e.g. TargetApp_M.ini).

; =======================================================================================
; 폴더 구조 / Folder Structure
; =======================================================================================
;
;   TargetApp_M/
;   │
;   ├─ TargetApp_M.exe  		런처 실행 파일     		/ Launcher executable
;   ├─ TargetApp_M.ini  		설정 파일            	/ Configuration file
;   ├─ TargetApp_M.log     		실행 로그            	/ Runtime log
;   │
;   ├─ App/						핵심 파일 및 템플릿		/ Core Files & Templates
;   │   │
;   │   ├─ TargetApp/      		타겟 앱 바이너리    		/ Target app binaries
;   │   │
;   │   ├─ Ext/            		추가 파일 루트     		/ Extra files root
;   │   │   ├─ Ast/        		1회 주입 에셋	   		/ One-time injection assets
;   │   │   ├─ Sys/       		시스템 주입 *     		/ System injection *
;   │   │   ├─ Org/        		초기화 설정 (기능 없음)	/ Factory Reset (Stub)
;	│	│	└─ Res/        		UI 리소스       			/ UI resources
;   │   │
;   │   └─ RawDat/         		데이터 초기 템플릿  		/ Default data template
;   │       ├─ AppDat/     		앱데이터 샌드박스			/ AppData sandbox
;   │       │   ├─ Local/  		%LocalAppData% 대체		/ %LocalAppData% substitute
;   │       │   ├─ LocalLow/ 	%LocalLow% 대체  		/ %LocalLow% substitute
;   │       │   └─ Roaming/ 	%AppData% 대체    		/ %AppData% substitute
;   │       ├─ Reg/        		레지스트리 템플릿    		/ Registry templates
;   │       ├─ Set/        		이식용 설정 파일    		/ Portable settings
;   │       └─ Usr/        		사용자 프로파일 *   		/ User profile *
;   │ 
;   └─ Dat/                		사용자 데이터 저장소  	/ Active user data
;
;   * Usr, Sys 폴더는 고급 사용자 전용.
;   * Usr, and Sys folders are for advanced users only.

; =======================================================================================
; 지원 매크로 / Available Macros
; =======================================================================================
;
;   {Base}              런처 최상위 폴더                   	/ Launcher root folder
;   {Run}               타겟 앱 실행 폴더 (RunPath)        	/ Target app folder (RunPath)
;   {Dat}               사용자 데이터 폴더 (DataPath)   		/ User data folder (DataPath)
;   {Ast}               에셋 폴더                           	/ Assets folder (App\Ext\Ast)
;   {Sys}           	시스템 DLL 폴더                     	/ System DLL folder (App\Ext\Sys)
;   {Res}           	리소스 폴더                         	/ Resources folder (App\Ext\Res)
;   {Ext}           	추가 파일 루트 (ExtPath)            	/ Extra files root (ExtPath)
;   {Exe}           	타겟 앱 실행 파일 전체 경로         	/ Full path to target executable
;   {AppName}           INI의 AppName 값                    	/ AppName value from INI
;   {CommonFiles}       공용 라이브러리 경로                	/ Shared library root
;   {_MIIIMEEnv}        MIIIME 환경 폴더                    	/ MIIIME environment folder
;
;   {Windows}           C:\Windows
;   {System32}          C:\Windows\System32                 
;   {SysWOW64}          C:\Windows\SysWOW64                 
;   {ProgramFiles}      C:\Program Files
;   {ProgramData}       C:\ProgramData
;
;   {UserProfile}   	C:\Users\[UserName]
;   {Docs}          	문서 폴더                           	/ Documents folder
;   {Desktop}       	바탕화면                            	/ Desktop
;   {Local}         	%LocalAppData%
;   {Roaming}       	%AppData%
;   {LocalLow}      	%UserProfile%\AppData\LocalLow
;   {Temp}          	임시 폴더                           	/ Temp folder
;   {StartMenu}     	시작 메뉴 폴더                      	/ Start menu folder (현재 사용자)
;   {Programs}      	프로그램 목록 폴더                  	/ Programs folder (현재 사용자)
;   {CommonStartMenu}  	공용 시작 메뉴 폴더                 	/ Common Start menu folder (모든 사용자)
;   {CommonPrograms}	공용 프로그램 목록 폴더             	/ Common Programs folder (모든 사용자)
;   %VAR%           	임의 환경 변수                      	/ Any environment variable (예 / e.g. %JAVA_HOME%)

; =======================================================================================
; 윈도우 표준 환경 변수 / Windows Standard Environment Variables
; =======================================================================================
; %변수명% 형식으로 사용. 변수명은 대소문자를 구분하지 않음.
; Use %VariableName% format. Variable names are case-insensitive.
;
;   %USERPROFILE%              	현재 사용자 홈 폴더          	/ Current user home folder
;   %USERNAME%                 	현재 사용자 계정 이름        	/ Current user account name
;   %APPDATA%                  	앱 데이터 (로밍)             / AppData\Roaming
;   %LOCALAPPDATA%             	앱 데이터 (로컬)             / AppData\Local
;   %TEMP% 또는 %TMP%    		임시 파일 폴더               / Temporary files folder
;
;   %SystemRoot% 또는 %WINDIR%  	윈도우 설치 폴더          	/ Windows installation folder
;   %SystemDrive%              	시스템 설치 드라이브         	/ System drive letter (e.g. C:)
;   %ProgramFiles%             	64비트 프로그램 설치 경로    	/ 64-bit Program Files
;   %ProgramFiles(x86)%        	32비트 프로그램 설치 경로    	/ 32-bit Program Files (x86)
;   %CommonProgramFiles%       	64비트 공용 라이브러리 경로 	/ Common Files (64-bit)
;   %CommonProgramFiles(x86)%  	32비트 공용 라이브러리 경로 	/ Common Files (32-bit)
;   %ProgramData%              	공용 프로그램 데이터      	/ All users application data
;
;   %COMPUTERNAME%             	PC 네트워크 이름           	/ Computer network name
;   %LOGONSERVER%              	로그인 인증 서버            	/ Logon authentication server
;   %USERDOMAIN%               	사용자 도메인/워크그룹     	/ User domain or workgroup
;   %PROCESSOR_ARCHITECTURE%   	CPU 아키텍처             	/ e.g. AMD64, x86
;   %NUMBER_OF_PROCESSORS%     	논리 프로세서 개수       		/ Number of logical processors
;
;   %PATH%                     	실행 파일 탐색 경로      		/ Executable search path
;   %PATHEXT%                  	실행 가능 확장자 목록     	/ Executable file extensions
;   %ComSpec%                  	명령 인터프리터 경로      	/ Command interpreter path
;   %PUBLIC%                   	공용 사용자 폴더            	/ e.g. C:\Users\Public


[Launch]
; 런처 기본 실행 설정 
; Basic launch settings
; ----------------------------------------------------------------------------------------

; 이전 실행 오류(크래시) 감지 및 자동 복구.
; Crash detection and auto-recovery from previous session.
; 1 = 수행 (기본값): 시작 시 _bakk 잔여 폴더를 탐지하여 호스트 AppData를 복원.
;     Enable (default): detects leftover _bakk folders on startup and restores host AppData.
; 0 = 통과: 항상 동일 PC에서만 사용하는 경우 등, 호스트 오염을 감수하고 부하를 줄이려는 경우.
;     Skip: for single-PC use where AppData contamination is acceptable to reduce overhead.
; ※ 주의: 0 설정 후 크래시 발생 시 호스트 AppData가 오염된 상태로 남을 수 있음.
; ※ Cautions: If a crash occurs with this set to 0, host AppData may remain in a contaminated state.
CrashRecovery=1

; 관리자 권한으로 실행 (1=사용, 0=미사용).
; Run as administrator (1=Enable, 0=Disable).
RunAsAdmin=0

; 런처 표시 이름 - 메시지 박스 제목 등에 사용됨.
; Launcher display name - used in message box titles, etc..
LauncherName=TargetApp MIIIME Launcher

; 내부 앱 식별 이름 - 임시 폴더명, 로그 식별 등에 사용됨.
; Internal app name - used for temp folder naming, log identification, etc..
AppName=TargetApp

; 실행 파일명 (RunPath 폴더 기준).
; Executable filename (relative to RunPath).
ExeName=TargetApp.exe

; 64비트 OS에서 우선 실행할 파일명 (비워두면 ExeName 사용).
; Executable for 64-bit OS (leave empty to use ExeName).
ExeName64=TargetApp64.exe

; 중복 실행 방지 뮤텍스 이름 (런처마다 고유값 권장).
; Mutex name for preventing duplicate instances (unique value recommended).
UniqueMutex=TargetApp_MIIIME_Mutex

; 다중 인스턴스 허용 여부 (1=허용, 0=차단).
; Allow multiple instances (1=Allow, 0=Block).
AllowMultipleInstances=0

; 작업 디렉토리 (비워두면 RunPath 사용, 매크로 사용 가능).
; Working directory (defaults to RunPath if empty, macros supported).
WorkDir=

; 타겟 앱 실행 직전에 실행할 외부 프로그램 (비어있으면 건너뜀, 매크로 사용 가능).
; External program to run immediately before the target app launches (leave empty to skip, macros supported).
; 비동기 실행 - 완료를 기다리지 않음. 판단과 책임은 사용자에게 있음.
; Runs asynchronously - does not wait for completion. Use at your own discretion and risk.
PreRun=

; 타겟 앱 종료 직후에 실행할 외부 프로그램 (비어있으면 건너뜀, 매크로 사용 가능).
; External program to run immediately after the target app exits (leave empty to skip, macros supported).
; 비동기 실행 - 완료를 기다리지 않음. 판단과 책임은 사용자에게 있음.
; Runs asynchronously - does not wait for completion. Use at your own discretion and risk.
PostRun=

[Directories]
; 런처 핵심 폴더 경로 (상대 경로 권장)
; Core folder paths (relative paths recommended)
; ----------------------------------------------------------------------------------------

; 타겟 앱 실행 파일 위치.
; Path to target app executable.
RunPath=App\TargetApp

; 데이터 초기화용 원본 템플릿 경로.
; Default data template path.
RawDataPath=App\RawDat

; 추가 파일 루트 경로 (Ast, Usr, Sys, Res 하위 폴더의 기준).
; Extra files root path (parent of Ast, Usr, Sys, Res subfolders).
ExtPath=App\Ext

; 사용자의 실제 사용 데이터가 저장되는 경로.
; Path where user data is actively stored and modified.
DataPath=Dat

[Environment]
; 환경변수 (예약 키)
; Environment variables (Reserved Keys)
; ----------------------------------------------------------------------------------------

; 기본 경로를 그대로 사용할 경우 작성할 필요 없음.
; Not required if using default paths.

; {CommonFiles} 매크로의 실제 경로를 변경할 때만 지정 (기본값: ..\CommonFiles).
; Only specify to override the {CommonFiles} macro path (default: ..\CommonFiles).
CommonFilesDir=D:\MySharedLibs

; {_MIIIMEEnv} 매크로의 실제 경로를 변경할 때만 지정 (기본값: ..\_MIIIMEEnv).
; Only specify to override the {_MIIIMEEnv} macro path (default: ..\_MIIIMEEnv).
_MIIIMEEnvDir=D:\MyMIIIMEEnv

; 특정 프로그램의 홈 경로 (Scite).
; Home path of a specific program (SciTE).
; TargetApp 프로그램 폴더 / TargetApp program folder.
TargetApp_HOME={Run}
; TargetApp 사용자 설정 저장 경로 / Path where TargetApp user settings are saved.
TargetApp_USERHOME={Run}

; ======================================================================
; PATH 설정 방법 / How to Set PATH
; ======================================================================

; 유형 1: PATH 확장 / Type 1: PATH Extension.
PATH01={Sys}\System32
PATH02={Sys}\SysWOW64
PATH03={Base}\..\_MIIIMEEnv\System32
PATH04={Base}\..\_MIIIMEEnv\SysWOW64
PATH05={CommonFiles}\Git\cmd
PATH06={CommonFiles}\Python
PATH07={CommonFiles}\Node.js

; 유형 2: 런타임 라이브러리 / Type 2: Runtime Library.
JAVA_HOME={CommonFiles}\Java64
_JAVA_OPTIONS="-Dfile.encoding=UTF-8"
GS_LIB={CommonFiles}\Ghostscript\lib
GS_DLL={CommonFiles}\Ghostscript\bin\gsdll64.dll

; 유형 3: 포터블 가상 변수 / Type 3: Portable Virtual Variables.
MY_APP_ROOT={Run}
MY_TEMP_DIR={Local}\Temp\MyApp

; 유형 4: 포터블 도구 홈 경로 / Type 4: Portable Tool Home Paths.
HOME={Dat}\Git\home
PYTHONUSERBASE={Dat}\Python
NPM_CONFIG_PREFIX={Dat}\Node.js\npm
NPM_CONFIG_CACHE={Dat}\Node.js\npm-cache

; 유형 5: 시스템 재정의 / Type 5: System Override.
LANG=ko_KR.UTF-8
TMP={Local}\Temp
TEMP={Local}\Temp

[Options]
; 런처 동작 옵션
; Launcher behavior options
; ----------------------------------------------------------------------------------------

; AppData 주입 방식 선택 / AppData injection mode.
; 1 = Junction 모드: NTFS 심볼릭 링크로 AppData 연결 (성능 우수, 데이터가 포터블 경로에 직접 저장됨).
;     Junction mode: Links AppData via NTFS symlink (Better performance, data saved directly to portable path).
; 0 = Swap 모드: AppData 폴더를 물리적으로 이동/복사 (비NTFS 드라이브 또는 FreezeMode 사용 시).
;     Swap mode: Physically moves/copies AppData (For non-NTFS drives or with FreezeMode).
UseJunction=1

; 동결 모드 - 읽기 전용, 종료 시 데이터 저장 안 함 / Freeze mode - read-only, no data saved on exit.
; 1 = 종료 시 모든 변경사항 폐기 (키오스크, 공용 PC, CD/BD 배포 등). 읽기 전용 매체 감지를 건너뜀.
;     All changes discarded on exit (kiosks, shared PCs, CD/BD distribution, etc.). Skips read-only media detection.
; 0 = 일반 모드. 변경사항을 Dat 폴더에 저장.
;     Normal mode. Changes saved to Dat folder.
; ※ 참고: FreezeMode=1 은 UseJunction=0 (Swap 모드)에서만 작동함.
; ※ Note: FreezeMode=1 only works with UseJunction=0 (Swap mode).
FreezeMode=0

; 읽기전용 매체 감지 (FreezeMode=0 일 때만 동작).
; Read-only media detection (only applies when FreezeMode=0).
; 1 = 수행 (기본값): 읽기전용 매체로 감지되면 안내 메시지 후 종료.
;     Enable (default): shows message and exits if read-only media is detected.
; 0 = 통과: USB/HDD 전용 환경에서 불필요한 부하를 줄이려는 경우.
;     Skip: reduces overhead for USB/HDD-only deployments.
; ※ 주의: 읽기전용 매체에서 실행하면 감지 없이 그대로 오류 발생 (사용자 감수).
; ※ Cautions: Running on read-only media will cause errors without warning (user accepts risk).
DetectReadOnly=1

; 로그 레벨 (0=꺼짐, 1=전체, 2=DEBUG, 3=INFO, 4=WARN, 5=ERROR).
; Log level (0=Off, 1=All, 2=DEBUG, 3=INFO, 4=WARN, 5=ERROR).
; 로그 파일은 런처와 동일한 폴더에 TargetApp_M.log로 생성.
; Log file is created as TargetApp_M.log in the same folder as the launcher.
LogLevel=0

; ======================================================================
; Firefox 계열 브라우저 포터블화 권장 인수
; Recommended arguments for portable Firefox
; ======================================================================

; --- 필수 / Essential
; 프로필 경로를 Dat\profile 폴더로 직접 지정.
; Directly sets the profile path to Dat\profile.
AddCommand=-profile "{Dat}\profile" 

; --- 권장 / Recommended
; 관리자 권한으로 실행 시 권한 강등 방지. 드래그 & 드롭 오류 방지.
; Prevents privilege de-elevation when running as admin. Fixes drag-and-drop errors.
AddCommand=-no-deelevate             
; 이미 실행 중인 Firefox 인스턴스와 독립적으로 실행.
; Ensures independent execution, ignoring any already-running Firefox instance.
AddCommand=-no-remote

; --- 기타 유용한 인수 / Other useful arguments
; 새 창으로 시작.
; Opens a new window.
AddCommand=-new-window
; 새 탭으로 시작.
; Opens a new tab.
AddCommand=-new-tab
; 실행시 특정 URL로 시작.
; Opens a specific URL on startup.
AddCommand=-url https://www.example.com
; 개인 정보 보호 창으로 시작.
; Opens in Private Browsing mode.
AddCommand=-private-window

; 예시: Floorp 포터블 권장 설정.
; Example: Recommended Floorp portable setup.
AddCommand=-profile "{Dat}\profile" -no-deelevate -no-remote

; ======================================================================
; Chromium / Electron 계열 앱 포터블화 권장 인수
; Recommended arguments for portable Chromium / Electron apps
; ======================================================================

; --- 필수 / Essential
; 사용자 데이터 폴더를 Dat 폴더로 지정 (AppData 외부에 데이터 저장).
; Sets the user data directory to Dat folder (Stores data outside AppData).
AddCommand=--user-data-dir="{Dat}"

; --- 권장 / Recommended
; 디스크 캐시를 Dat\Cache 폴더로 지정 (캐시가 포터블 경로에 쌓임).
; Sets disk cache to Dat\Cache (Cache accumulates in portable path).
AddCommand=--disk-cache-dir="{Dat}\Cache"
; 첫 실행 마법사 및 기본 브라우저 확인 대화상자를 숨김.
; Hides the first-run wizard and default browser prompt.
AddCommand=--no-first-run --no-default-browser-check
; 백그라운드 네트워크 활동 및 백그라운드 모드를 비활성화.
; Disables background networking and background app mode.
AddCommand=--disable-background-networking --disable-background-mode
; 충돌 보고 기능을 비활성화.
; Disables crash reporting (Breakpad/Crashpad).
AddCommand=--disable-breakpad --disable-crash-reporter
; GPU 가속을 비활성화 (드라이버 오류나 가상 환경에서 유용).
; Disables GPU acceleration (Useful for driver issues or virtual environments).
AddCommand=--disable-gpu
; 렌더러 코드 무결성(RendererCodeIntegrity) 및 StartupBoost 등 기능을 제어.
; Controls features such as RendererCodeIntegrity and StartupBoost.
; --enable-features와 --disable-features는 각각 하나만 사용하고, 여러 항목은 쉼표로 구분.
; --enable-features and --disable-features each accept only one argument. Multiple items must be separated by commas (no spaces).
AddCommand=--enable-features 
AddCommand=--disable-features
AddCommand=--enable-features=PasswordImport
AddCommand=--disable-features=StartupBoost,RendererCodeIntegrity
; 시작 메뉴 바로가기 자동 생성 방지 (Chromium 89 이상에서 유효).
; Prevents automatic Start Menu shortcut creation and StartupBoost registration (Valid for Chromium 89+).
AddCommand=--no-startup-window --disable-features=StartupBoost

; --- 기타 유용한 인수 / Other useful arguments
; HTTP 혼합 콘텐츠 허용 / Allow mixed HTTP content.
AddCommand=--allow-running-insecure-content  
; 탭별 오디오 음소거 버튼 활성화 / Enable per-tab mute.
AddCommand=--enable-tab-audio-muting
; DPI 스케일 강제 고정 / Force DPI scale to 1.
AddCommand=--force-device-scale-factor=1     

; ======================================================================
; 기타 앱 공통 유용 인수 / General purpose arguments
; ======================================================================

; 앱 데이터 경로를 직접 지정하는 일반적인 인수 형태 (앱마다 다름).
; General form for specifying app data path directly (Varies by app).
AddCommand=--data-dir="{Dat}"
AddCommand=--config="{Dat}\config.ini"
AddCommand=--portable

[ProcessWatch]
; 타겟 앱(ExeName) 외에 추가로 종료를 감시할 프로세스 목록
; Additional processes to monitor for exit, besides the main app (ExeName)
; ----------------------------------------------------------------------------------------

; 등록된 모든 프로세스가 종료되어야 최종 정리(Cleanup)가 시작.
; Cleanup starts only after ALL registered processes have terminated.
; 런처는 자식 프로세스를 자동 추적하지 않으므로, 별도로 실행되는 프로세스는 반드시 등록.
; The launcher does not auto-track child processes. Register any separately spawned processes here.
01=updater.exe
02=TargetApp64.exe
03=crashpad_handler.exe

[ProcessKill]
; 앱 종료 후 잔류하는 헬퍼 프로세스를 강제 종료합니다.
; Forcefully terminates helper processes that remain after the app exits.
; ProcessClose 시도 후 500ms 대기, 미종료 시 ProcessKill 강제 종료.
; Attempts ProcessClose, waits 500ms, then force-kills if still running.
01=updater.exe
02=crashpad_handler.exe
03=default-browser-agent.exe
04=pingsender.exe

[Registry]
; 레지스트리 제어
; Registry control
; ----------------------------------------------------------------------------------------

; Dat\Reg 폴더가 있을 때만 동작.
; Only active when the Dat\Reg folder exists.

; 실행 시 - 호스트 레지스트리 키 백업 후 포터블 .reg 파일 주입.
; On launch - backup host registry key, inject portable .reg file.
; 종료 시 - 변경사항 내보내기(Export) 후 삭제, 호스트 값 복원.
; On exit - export changes, delete key, restore host value.
01=HKEY_CURRENT_USER\SOFTWARE\VendorName\TargetApp
02=HKEY_CURRENT_USER\SOFTWARE\VendorName\TargetApp_Settings

[RegistryRoot]
; 상위 레지스트리 제어
; Root registry control
; ----------------------------------------------------------------------------------------

; 종료 정리 시, 지정한 상위 키가 완전히 비어있을 경우에만 삭제.
; On exit, deletes the specified parent key ONLY if it is completely empty.
01=HKEY_CURRENT_USER\SOFTWARE\VendorName

[RegistryFix]
; 레지스트리 값 수정
; Forcefully overrides registry values
; ----------------------------------------------------------------------------------------

; SmartSkip=0 : 항상 실행. / Always run.
; SmartSkip=1 : 경로·호스트 변경 감지 시에만 실행. / Run only when env change detected.
; SmartSkip=2 : 항상 스킵 (비활성, 기본값). / Always skip (disabled, default).
; FreezeMode=1 또는 읽기전용 매체에서는 값과 무관하게 항상 스킵.
; Always skipped when FreezeMode=1 or read-only media is detected.
SmartSkip=1

; 형식: 레지스트리 키 경로|값 이름|새 데이터[|값 형식].
; Format: KeyPath|ValueName|Value[|ValueType].
; ValueName: 비워두면 '(기본값)'에 기록됨 / Empty = writes to '(Default)'
; ValueType: [선택] REG_SZ(기본값), REG_DWORD, REG_EXPAND_SZ 등.
;            [Optional] REG_SZ (default), REG_DWORD, REG_EXPAND_SZ, etc.

; 예시: 설치 경로를 현재 RunPath로 강제 고정.
; Example: Force-set install path to current RunPath.
01=HKEY_CURRENT_USER\Software\VendorName\TargetApp|InstallPath|{Run}

; 예시: 캐시 경로를 Dat 폴더로 강제 지정.
; Example: Force-set cache path to Dat folder.
02=HKEY_CURRENT_USER\Software\VendorName\TargetApp|CachePath|{Dat}\Cache

; 예시: 자동 업데이트 비활성화 (DWORD).
; Example: Disable auto-update (DWORD).
03=HKEY_CURRENT_USER\Software\VendorName\TargetApp|AutoUpdate|0|REG_DWORD

; 예시: 프로토콜 핸들러 기본값 등록 (값 이름 없음 = 기본값).
; Example: Register protocol handler default value (empty name = Default).
04=HKEY_CURRENT_USER\Software\Classes\myapp||MIIIME Launcher Protocol

; 예시: 프로토콜 실행 명령어 등록.
; Example: Register protocol handler command.
05=HKEY_CURRENT_USER\Software\Classes\myapp\shell\open\command||"{Exe}" "--url" "%1"

[RegistryShell]
; Windows 우클릭 메뉴에 항목을 등록
; Registers items in the Windows right-click context menu
; ----------------------------------------------------------------------------------------

; 실행 시 등록, 종료 시 자동 해제. 기존 값이 있으면 백업 후 복원.
; Registered on launch, removed on exit. Existing values are backed up and restored.

; 형식: 대상|ID|메뉴 텍스트|명령어[|아이콘 경로]'
; Format: Target|ID|MenuText|Command[|IconPath]'

; 예시: 폴더 우클릭 → TargetApp으로 열기.
; Example: Folder right-click → Open with TargetApp.
01=Directory|TargetApp_Open|Open with TargetApp|"{Exe}" "%1"|"{Exe}"

; 예시: 폴더 빈 공간 우클릭 → 여기서 TargetApp 실행.
; Example: Folder background right-click → Run TargetApp Here.
02=Directory\Background|TargetApp_Here|Run TargetApp Here|"{Exe}" "%V"|"{Exe}"

; 예시: .mxe 확장자 우클릭 → TargetApp으로 편집.
; Example: .mxe file right-click → Edit with TargetApp.
03=.mxe|TargetApp_Edit|Edit with TargetApp|"{Exe}" -edit "%1"

; 예시: 모든 파일 우클릭 → TargetApp으로 강제 열기 (아이콘 인덱스 지정).
; Example: Any file right-click → Open with TargetApp (Force) with icon index.
04=*|TargetApp_Force|Open with TargetApp (Force)|"{Exe}" "%1"|"{Exe},0"

[FileWrite]
; 지정한 파일의 내용을 수정
; Modifies the contents of specified files
; ----------------------------------------------------------------------------------------

SmartSkip=1

; ======================================================================
; 유형 A: 텍스트 직접 치환, 없으면 추가 / Type A: Replace or Append.
; 형식: 파일경로|찾을문자열|바꿀문자열.
; Format: FilePath|FindString|ReplaceString.

; 예시: Firefox 포터블에서 시작 메뉴 바로가기 자동 생성 방지 (prefs.js에 항목이 없으면 추가, 이미 있으면 통과).
; Example: Prevent Start Menu shortcut auto-creation in Firefox portable (Append to prefs.js if absent, skip if already present.).
01={Dat}\profile\prefs.js|user_pref("browser.shell.checkDefaultBrowser", false);|user_pref("browser.shell.checkDefaultBrowser", false);
02={Dat}\profile\prefs.js|user_pref("browser.shell.didSkipDefaultBrowserCheckOnFirstRun", true);|user_pref("browser.shell.didSkipDefaultBrowserCheckOnFirstRun", true);

; 예시: XML 파일의 하드코딩된 경로를 현재 실행 경로로 치환.
; Example: Replace hardcoded path in XML file with current run path.
03={Run}\Config.xml|<WorkDir>C:\OldPath</WorkDir>|<WorkDir>{Run}</WorkDir>

; ======================================================================
; 유형 B: INI 섹션 + 키 직접 수정 / Type B: Direct INI Section + Key Modification.
; 형식: 파일경로|섹션|Key:키|새값 (현재 값과 동일하면 쓰기를 건너뜀 - 멱등성 보장).
; Format: FilePath|Section:Section|Key:Key|NewValue (Skips write if value is already current - idempotent).

; 예시: 앱 설정 파일의 저장 경로를 Dat 폴더로 업데이트.
; Example: Update save path in app config to Dat folder.
01={Run}\settings.ini|Section:Main|Key:SavePath|{Dat}\Saves

; ======================================================================
; 유형 C: 키 자동 감지 교체 / Type C: Auto-Detect Key Replace.
; 형식: 파일경로|Key:키이름|새값 (JS, JSON 형식 감지 시 역슬래시를 자동으로 이중화).
; Format: FilePath|Key:KeyName|NewValue (Automatically doubles backslashes when detecting JS and JSON formats).

; 예시: Notepad4.ini의 DefaultDirectory를 현재 실행 경로로 교체.
; Example: Auto-replace DefaultDirectory in Notepad4.ini with current run path.
01={Run}\Notepad4.ini|Key:DefaultDirectory|{Run}

; 예시: prefs.js의 다운로드 경로를 현재 바탕화면으로 설정.
; Example: Auto-set download path in prefs.js to current desktop.
02={Dat}\profile\prefs.js|Key:browser.download.dir|{Desktop}

; 예시: settings.json의 autoit.aiPath를 현재 절대 경로로 갱신.
; Example: Automatically updating autoit.aiPath in settings.json to the current absolute path.
03={Dat}\appdata\Code\User\settings.json|Key:autoit.aiPath|{Base}\..\AutoIt3_M\App\AutoIt3

; ※ 주의: 같은 키가 여러 섹션에 있으면 모두 교체됨. 특정 섹션만 수정하려면 유형 B를 사용.
; ※ Cautions: All occurrences are replaced if the same key exists in multiple sections. Use Type B for section-specific modification.

