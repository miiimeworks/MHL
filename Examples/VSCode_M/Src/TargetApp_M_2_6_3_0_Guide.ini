; ----------------------------------------------------------------------------------------

; App\Ext\Ast 폴더가 있을 때만 동작.
; Only active when App\Ext\Ast folder exists.

; AlwaysUpdate=0: 최초 실행 시에만 복사 (기본값, 빠름).
;                 Copy only on first run (default, faster).
; AlwaysUpdate=1: 매 실행마다 파일 변경 여부(크기/날짜) 확인 후 복사 (개발/테스트용).
;                 Check for changes (size/date) on every run and copy if needed (for dev/test).
AlwaysUpdate=0

; 형식: 소스|목적지.
; Format: Source|Destination.

; 예시: Ast 전체 내용을 RunPath 바로 아래에 복사.
; Example: Copy all Ast contents directly into RunPath.
01=*|{Run}

; 예시: Lang 폴더를 RunPath\Lang_Kr 로 복사.
; Example: Copy Lang folder to RunPath\Lang_Kr.
02=Lang|{Run}\Lang_Kr

; 예시: 특정 파일을 RunPath 아래로 복사.
; Example: Copy a specific file into RunPath.
03=license.dat|{Run}\license.dat

; 예시: Firefox/Floorp 포터블 - 미리 세팅한 user.js를 프로필 폴더에 복사.
; Example: Firefox/Floorp portable - Copy the pre-set user.js to the profile folder.
04=profile\user.js|{Dat}\profile\user.js

[UserProfile]
; %USERPROFILE% 경로 관리
; %USERPROFILE% path control
; ----------------------------------------------------------------------------------------

; App\RawDat\Usr 폴더가 있을 때만 동작.
; Only active when App\RawDat\Usr folder exists.

; ※ 주의: 고급 사용자 전용.
; ※ Cautions: Advanced users only.
; 이 기능은 시스템 사용자 프로필에 직접 개입함.
; This feature directly modifies the system user profile.
; Blacklist에 없는 항목은 모두 처리됨. 목록을 반드시 확인.
; All items not in Blacklist will be processed. Review the list carefully.

; %USERPROFILE% 경로에 Usr 폴더 내용을 Junction 또는 복사로 주입.
; Injects Usr folder contents into %USERPROFILE% via Junction or copy.
; 폴더 → Junction(UseJunction=1) 또는 DirCopy, 단독 파일 → FileCopy.
; Processed identically to AppDat - changes are saved back to Dat\Usr on exit.
; AppDat과 동일하게 처리되어 종료 시 변경사항이 Dat\Usr로 회수됨.
; Folders: Junction (UseJunction=1) or DirCopy. Standalone files: FileCopy.

; 절대로 건드리지 않을 파일 및 폴더 목록 (| 로 구분).
; Files & folders that must never be touched (separated by |).
Blacklist=|AppData|Desktop|Documents|Downloads|Favorites|Links|Music|Pictures|Saved Games|Searches|Videos|OneDrive|Dropbox|Google Drive|IntelGraphicsProfiles|.oracle_jre_usage|ntuser.dat|ntuser.dat.log1|ntuser.dat.log2|ntuser.ini|

[SysInjection]
; 시스템 파일 주입
; Injects files into system files
; ----------------------------------------------------------------------------------------

; App\Ext\Sys 폴더가 있을 때만 동작.
; Only active when App\Ext\Sys folder exists.

; ※ 주의: 고급 사용자 전용.
; ※ Cautions: Advanced users only.
; 시스템 파일 조작은 관리자 권한(RunAsAdmin=1) 필요. 
; System file manipulation requires admin rights (RunAsAdmin=1). 
; 잘못된 설정은 시스템 불안정을 초래할 수 있음.
; Incorrect settings may cause system instability.

; 지정한 파일을 System32, Windows 등 시스템 경로에 주입. 종료 시 원본 복원.
; Injects files into system paths (System32, Windows, etc.). Original files restored on exit.

; SkipIfExists=1: 목적지에 파일이 이미 있으면 해당 항목 통과 (호스트 파일 사용).
;				  Skip the item if the file already exists at the destination (Uses the host file).
; SkipIfExists=0: 항상 주입 (기본값).
;				  Always inject/overwrite (Default value).
SkipIfExists=0

; 형식: 소스|목적지.
; Format: Source|Target.

; 예시: DLL 주입.
; Example: DLL injection.
01=64bit_System32\msvcp140.dll|{System32}\msvcp140.dll
02=64bit_System32\vcruntime140.dll|{System32}\vcruntime140.dll
03=32bit_SysWOW64\msvcp140.dll|{SysWOW64}\msvcp140.dll
04=32bit_SysWOW64\vcruntime140.dll|{SysWOW64}\vcruntime140.dll

; 예시: 드라이버 파일 배치 (관리자 권한 필수) - 드라이버 활성화는 별도의 서비스 등록(sc create 등)이 필요.
; Example: Driver file placement (admin required) - Driver activation requires separate service registration (sc create, etc.).
05=Drivers\my_driver.sys|{System32}\drivers\my_driver.sys

; 예시: 라이선스 파일을 Documents 폴더로 복사.
; Example: Copy license file to Documents folder.
06=Key.lic|{Docs}\MySoftware\Key.lic

[Resources]
; 런처 UI 리소스 설정 
; Configure launcher UI resources
; ----------------------------------------------------------------------------------------

; App\Ext\Res 폴더가 있을 때만 동작.
; Only active when App\Ext\Res folder exists.

SmartSkip=1

; 폴더 아이콘 경로 (비워두면 미적용, 매크로 사용 가능).
; Folder icon path (leave empty to disable, macros supported)
; 런처 폴더에 desktop.ini를 생성하여 폴더 아이콘을 적용.
; Creates desktop.ini in the launcher folder to apply the icon.
FolderIcon={Ext}\Res\Folder.ico

; 스플래시 이미지 경로 (PNG 권장, 투명도 지원, 비워두면 미표시).
; Splash image path (PNG recommended, transparency supported, leave empty to disable).
Splash={Ext}\Res\Splash.png

; 스플래시 표시 시간 (밀리초, 기본값 1500 = 1.5초).
; Splash display duration in milliseconds (default 1500 = 1.5 seconds).
SplashDuration=1500

[Advanced]
; 고급 최적화 및 타임아웃 설정
; Advanced optimization and timeout settings
; ----------------------------------------------------------------------------------------

; 특별한 이유가 없으면 기본 값을 유지.
; Keep defaults unless you have a specific reason to change them.

; 파일 이동/삭제 실패 시 재시도 횟수.
; Number of retries on file move/delete failure.
RetryLimit=10

; 재시도 간격 (밀리초).
; Retry interval (milliseconds).
RetryDelay=50

; 앱 종료 감지 후 정리 작업 시작까지 대기 시간 (밀리초).
; Wait time before starting cleanup after app exit detection (milliseconds).
CleanupWait=50

; 프로세스 생존 여부 감시 주기 (밀리초, 너무 짧으면 CPU 점유율 상승).
; Process monitoring interval (ms, too short will increase CPU usage).
ProcessCheckInterval=200

; SmartSet/데이터 복사 시 절대 건드리지 않을 시스템 폴더 목록.
; System folders to always exclude during SmartSet/data copy.
SystemFolderExclusions=|Microsoft|Windows|Packages|Boot|PerfLogs|

; 프로세스 종료 판단 임계값 (연속 미감지 횟수가 이 값 초과 시 종료로 판단).
; Exit threshold - process is considered exited when not detected consecutively more than this count.
ExitThreshold=2

; 로그 파일 최대 크기 (Bytes, 초과 시 .old 로 백업 후 새로 시작) 기본값 5242880 = 5MB.
; Maximum log file size in bytes (rotates to .old when exceeded) default 5242880 = 5MB.
LogRotationSize=5242880

; 임시 폴더/세션 ID용 UUID 양끝 트리밍 길이.
; Characters to trim from both ends of UUID for temp folder/session ID.
GuidTrimLen=1

; 최소 요구 OS 빌드 번호 (0=미사용, 미충족 시 경고 후 종료).
; Minimum required OS build number (0=disabled, exits with warning if not met).
; 참고 빌드: Win10 1903=18362 / Win10 21H2=19044 / Win11=22000 / Win11 23H2=22631
; Reference builds: Win10 1903=18362 / Win10 21H2=19044 / Win11=22000 / Win11 23H2=22631
MinOSBuild=0
