; MIIIME Hybrid Launcher Configuration Guide
; ⓒ 2026 MIIIME

; 이 파일은 ANSI 인코딩으로 저장되어야 함.
; This file must be saved in ANSI encoding.

[Launch]
CrashRecovery=0
RunAsAdmin=0
LauncherName=VSCode MIIIME Launcher
AppName=VSCode
ExeName=Code.exe
ExeName64=Code.exe
UniqueMutex=VSCode_MIIIME_Mutex
AllowMultipleInstances=1
WorkDir=
PreRun=
PostRun=

[Directories]
RunPath=App\VSCode
RawDataPath=App\RawDat
ExtPath=App\Ext
DataPath=Dat

[Environment]
; --- VSCode 전용 / VSCode Specific ---
VSCODE_EXTENSIONS={Dat}\extensions
VSCODE_APPDATA={Dat}\appdata
VSCODE_LOGS={Dat}\logs

; --- AutoIt 연동 / AutoIt Integration ---
; AutoIt3 폴더 (AutoIt3.exe, Au3Info.exe 포함)
PATH02={Base}\..\AutoIt3_M\App\AutoIt3
; SciTE 폴더 (SciTE.exe 포함)
PATH03={Base}\..\AutoIt3_M\App\AutoIt3\SciTE
; Aut2Exe 폴더 (Aut2Exe.exe 컴파일러 포함)
PATH04={Base}\..\AutoIt3_M\App\AutoIt3\Aut2Exe

; SciTE4AutoIt3 포터블 홈
SCITE_HOME={Base}\..\AutoIt3_M\App\AutoIt3\SciTE
SCITE_USERHOME={Base}\.\AutoIt3_M\App\AutoIt3\SciTE

; --- Git 연동 / Git Integration ---
PATH01={Base}\..\GitPortable\App\Git\cmd
HOME={Base}\..\GitPortable\App\Git

; --- Python 연동 / Python Integration ---
;PATH05={_MIIIMEEnv}\Python
;PATH06={_MIIIMEEnv}\Python\Scripts
;PYTHONUSERBASE={Dat}\Python
;PYTHONDONTWRITEBYTECODE=1

; --- Node.js 연동 / Node.js Integration ---
;PATH07={_MIIIMEEnv}\Node.js
;NPM_CONFIG_PREFIX={Dat}\Node.js\npm
;NPM_CONFIG_CACHE={Dat}\Node.js\npm-cache
;NPM_CONFIG_USERCONFIG={Dat}\Node.js\.npmrc

; ---  ---
;PATH01={Env}\System32
;PATH02={Env}\SysWOW64
;PATH03={Base}\..\_MIIIMEEnv\System32
;PATH04={Base}\..\_MIIIMEEnv\SysWOW64

[Options]
UseJunction=1
FreezeMode=0
DetectReadOnly=0
LogLevel=0
AddCommand=

[ProcessWatch]
01=code-tunnel.exe
02=inno_updater.exe

[FileWrite]
SmartSkip=1
; settings.json의 autoit.aiPath를 현재 절대 경로로 자동 갱신
; INI에서 {Base}는 절대 경로로 치환되고, JSON에는 \\ 로 자동 이중화되어 기록됩니다.
01={Dat}\appdata\Code\User\settings.json|Key:autoit.aiPath|{Base}\..\AutoIt3_M\App\AutoIt3\

[CleanupDelete]
SmartSkip=2
01={Dat}\appdata\Code\Code Cache
02={Dat}\appdata\Code\Crashpad
03={Dat}\appdata\Code\DawnGraphiteCache
04={Dat}\appdata\Code\DawnWebGPUCache
05={Dat}\appdata\Code\Dictionaries
06={Dat}\appdata\Code\GPUCache
07={Dat}\appdata\Code\logs
08={Dat}\appdata\Code\Network
09={Dat}\appdata\Code\Service Worker
10={Dat}\appdata\Code\Shared Dictionary
11={Dat}\appdata\Code\WebStorage
12={Dat}\appdata\Code\blob_storage
13={Dat}\appdata\Code\Cache
14={Dat}\appdata\Code\CachedConfigurations
15={Dat}\appdata\Code\CachedData
16={Dat}\appdata\Code\CachedExtensionVSIXs
17={Dat}\appdata\Code\CachedProfilesData
18={Dat}\appdata\Code\clp
19={Dat}\appdata\Code\Local Storage
20={Dat}\appdata\Code\Session Storage
21={Dat}\appdata\Code\SharedStorage
22={Dat}\appdata\Code\Workspaces
23={Dat}\appdata\Code\User\workspaceStorage
24={Dat}\appdata\Code\Backups
25={Dat}\appdata\Code\DIPS

[Assets]
AlwaysUpdate=0
;01=*|{Run}

[UserFile]
SmartSkip=0
01=.vscode|{UserProfile}\.vscode

[Resources]
SmartSkip=1
FolderIcon=Folder.ico
;Splash=Splash.png
;SplashDuration=1500

[Advanced]
RetryLimit=10
RetryDelay=50
CleanupWait=50
ProcessCheckInterval=200
UserFileBlacklist=|AppData|Desktop|Documents|Downloads|Favorites|Links|Music|Pictures|Saved Games|Searches|Videos|OneDrive|Dropbox|Google Drive|IntelGraphicsProfiles|.oracle_jre_usage|ntuser.dat|ntuser.dat.log1|ntuser.dat.log2|ntuser.ini|
CleanupFolderExclusions=|Microsoft|Windows|Packages|Boot|PerfLogs|
ExitThreshold=2
LogRotationSize=5242880
GuidTrimLen=1
MinOSBuild=0