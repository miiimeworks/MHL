[Launch]
CrashRecovery=0
RunAsAdmin=0
LauncherName=QTranslate MIIIME Launcher
AppName=QTranslate
ExeName=QTranslate.exe
ExeName64=
UniqueMutex=QTranslate_MIIIME_Mutex
AllowMultipleInstances=0
WorkDir=
PreRun=
PostRun=

[Directories]
RunPath=App\QTranslate
RawDataPath=App\RawDat
ExtPath=App\Ext
DataPath=Dat

[Environment]
;PATH01={Env}\System32
;PATH02={Env}\SysWOW64

[Options]
UseJunction=1
FreezeMode=0
DetectReadOnly=0
LogLevel=0
AddCommand=

[ProcessWatch]
;01=updater.exe

[ProcessKill]
;01=crashpad_handler.exe

[Registry]
01=HKEY_CURRENT_USER\Software\QTranslate"

[RegistryRoot]
;01=HKEY_CURRENT_USER\SOFTWARE\VendorName

[RegistryShell]
;01=Directory|QTranslate_Open|Open with QTranslate|"{Exe}" "%1"|"{Exe}"

[RegistryFix]
SmartSkip=1
;01=HKEY_CURRENT_USER\Software\VendorName\QTranslate|InstallPath|{Run}

[FileWrite]
SmartSkip=1
;01={Run}\QTranslate.ini|Settings|KEY:DefaultDirectory|{Run}

[CleanupExclude]
SmartSkip=2
;01={Dat}\profile\places.sqlite

[CleanupDelete]
SmartSkip=2
;01={Dat}\profile\startupCache

[Assets]
SmartSkip=1
01=*|{Run}

[Resources]
SmartSkip=1
FolderIcon=Folder.ico
;Splash=Splash.png
;SplashDuration=1500

[Advanced]
RetryLimit=10
RetryDelay=50
CleanupWait=50
ProcessCheckInterval=200
UserFileBlacklist=|AppData|Desktop|Documents|Downloads|Favorites|Links|Music|Pictures|Saved Games|Searches|Videos|OneDrive|Dropbox|Google Drive|IntelGraphicsProfiles|.oracle_jre_usage|ntuser.dat|ntuser.dat.log1|ntuser.dat.log2|ntuser.ini|
