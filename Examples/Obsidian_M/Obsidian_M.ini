; MIIIME Hybrid Launcher Configuration Guide
; ⓒ 2026 MIIIME

; 이 파일은 ANSI 인코딩으로 저장되어야 함.
; This file must be saved in ANSI encoding.

[Launch]
CrashRecovery=1
RunAsAdmin=0
LauncherName=Obsidian MIIIME Launcher
AppName=Obsidian
ExeName=Obsidian.exe
ExeName64=
UniqueMutex=Obsidian_MIIIME_Mutex
AllowMultipleInstances=0
WorkDir=
PreRun=
PostRun=

[Directories]
RunPath=App\Obsidian
RawDataPath=App\RawDat
ExtPath=App\Ext
DataPath=Dat

[Options]
UseJunction=1
FreezeMode=0
DetectReadOnly=0
LogLevel=0
AddCommand=

[Registry]
01=HKEY_CURRENT_USER\SOFTWARE\Classes\obsidian

[RegistryFix]
SmartSkip=0
01=HKEY_CURRENT_USER\SOFTWARE\Classes\obsidian\shell\open\command||"{Run}\Obsidian.exe" -- "%1"|REG_SZ

[FileWrite]
SmartSkip=1
01={Roaming}\Obsidian\obsidian.json|Key:path|{Base}\Vault

[ProcessWatch]
01=installer.exe

[CleanupExclude]
SmartSkip=2

01={Roaming}\Obsidian\IndexedDB
02={Roaming}\Obsidian\Local Storage
03={Roaming}\Obsidian\Session Storage
04={Roaming}\Obsidian\WebStorage
05={Roaming}\Obsidian\obsidian.json
06={Roaming}\Obsidian\DIPS
07={Roaming}\Obsidian\id
08={Roaming}\Obsidian\Local State
09={Roaming}\Obsidian\Preferences
10={Roaming}\Obsidian\Network

[CleanupDelete]
SmartSkip=2

; 새로운 경로에서 생성되는 hash.json 파일을 삭제. [CleanupExclude] {Roaming}\Obsidian\obsidian.json로 대체.
; Deletes the hash.json file generated at a new path. Superseded by [CleanupExclude] {Roaming}\Obsidian\obsidian.json.
; 경로가 바뀌면 hash.json이 삭제 된 후 다른 이름으로 새로 생성되므로 한 번 윈도우 크기를 재 설정 해주어야 함 - 합리적인 타협.
; When the path changes, hash.json is deleted and recreated under a new name, so the window size must be manually adjusted once — a reasonable trade-off.
;01={Roaming}\Obsidian\################.json
20={Local}\Obsidian\CrashReports

21={Run}\Squirrel-CheckForUpdate.log
22={Run}\Squirrel-ProcessStart.log
23={Run}\Squirrel-Shortcut.log

24={Programs}\Obsidian
25={StartMenu}\Obsidian
26={CommonPrograms}\Obsidian
27={CommonStartMenu}\Obsidian
28={Programs}\Obsidian.lnk
29={StartMenu}\Obsidian.lnk
30={CommonPrograms}\Obsidian.lnk
31={CommonStartMenu}\Obsidian.lnk
32={Desktop}\Obsidian.lnk

[Assets]
AlwaysUpdate=0
;01=*|{Run}

[UserProfile]
Blacklist=|AppData|Desktop|Documents|Downloads|Favorites|Links|Music|Pictures|Saved Games|Searches|Videos|OneDrive|Dropbox|Google Drive|IntelGraphicsProfiles|.oracle_jre_usage|ntuser.dat|ntuser.dat.log1|ntuser.dat.log2|ntuser.ini|

[Resources]
SmartSkip=1
FolderIcon={Res}\Folder.ico
;Splash={Res}\Splash.png
;SplashDuration=1500

[Advanced]
RetryLimit=10
RetryDelay=50
CleanupWait=50
ProcessCheckInterval=200
SystemFolderExclusions=|Microsoft|Windows|Packages|Boot|PerfLogs|
CleanupFolderExclusions=|Microsoft|Windows|Packages|Boot|PerfLogs|
ExitThreshold=2
LogRotationSize=5242880
GuidTrimLen=1
MinOSBuild=0