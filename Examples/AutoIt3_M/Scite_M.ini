; MIIIME Hybrid Launcher Configuration Guide
; ⓒ 2026 MIIIME

; 이 파일은 ANSI 인코딩으로 저장되어야 함.
; This file must be saved in ANSI encoding.

[Launch]
CrashRecovery=0
RunAsAdmin=0
LauncherName=AutoIt3 MIIIME Launcher
AppName=SciTE
ExeName=SciTE.exe
ExeName64=
UniqueMutex=AutoIt3_MIIIME_Mutex
AllowMultipleInstances=1
WorkDir=
PreRun=
PostRun=

[Directories]
RunPath=App\AutoIt3\SciTE
RawDataPath=App\RawDat
ExtPath=App\Ext
DataPath=Dat

[Environment]
; 1. SciTE 프로그램 폴더 (SciTEGlobal.properties, AutoIt3Wrapper, Tidy 등의 위치)
SCITE_HOME={Run}
; 2. SciTE 사용자 설정 저장 경로 (abbrev.properties, SciTEUser.properties, SciTE.session)
SCITE_USERHOME={Run}
; 3. AutoIt3 실행파일 및 SciTE 도구 경로를 PATH에 추가
;PATH={Base}\App\AutoIt3;{Base}\App\AutoIt3\SciTE

PATH01={Env}\System32
PATH02={Env}\SysWOW64

[Options]
UseJunction=1
FreezeMode=0
DetectReadOnly=0
LogLevel=0
AddCommand=

[ProcessWatch]
01=Au3Check.exe
02=Au3Info.exe
03=Au3Info_x64.exe
04=AutoIt3.exe
05=AutoIt3_x64.exe
06=AutoIt3Help.exe
07=Aut2exe.exe
08=Aut2exe_x64.exe
09=upx.exe
10=AU3Stripper.exe
11=Tidy.exe

[Assets]
SmartSkip=1
01=*|{Run}

[Resources]
SmartSkip=1
FolderIcon=Folder.ico
;Splash=Splash.png
;SplashDuration=1500

[Advanced]
RetryLimit=10
RetryDelay=50
CleanupWait=50
ProcessCheckInterval=200
UserFileBlacklist=|AppData|Desktop|Documents|Downloads|Favorites|Links|Music|Pictures|Saved Games|Searches|Videos|OneDrive|Dropbox|Google Drive|IntelGraphicsProfiles|.oracle_jre_usage|ntuser.dat|ntuser.dat.log1|ntuser.dat.log2|ntuser.ini|
CleanupFolderExclusions=|Microsoft|Windows|Packages|Boot|PerfLogs|
ExitThreshold=2
LogRotationSize=5242880
GuidTrimLen=1
MinOSBuild=0