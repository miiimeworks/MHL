; MIIIME Hybrid Launcher Configuration Guide
; ⓒ 2026 MIIIME

[Launch]
CrashRecovery=1
RunAsAdmin=0
LauncherName=AutoIt3 MIIIME Launcher
AppName=Aut2Exe
ExeName=Aut2Exe.exe
ExeName64=Aut2Exe_x64.exe
UniqueMutex=AutoIt3_MIIIME_Mutex
AllowMultipleInstances=1
WorkDir=
PreRun=
PostRun=

[Directories]
RunPath=App\AutoIt3\Aut2Exe

[Advanced]
RetryLimit=10
RetryDelay=50
CleanupWait=50
ProcessCheckInterval=200
SystemFolderExclusions=|Microsoft|Windows|Packages|Boot|PerfLogs|
ExitThreshold=2
LogRotationSize=5242880
GuidTrimLen=1
MinOSBuild=0
