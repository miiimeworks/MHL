; MIIIME Hybrid Launcher Configuration Guide
; ⓒ 2026 MIIIME

; 이 파일은 ANSI 인코딩으로 저장되어야 함.
; This file must be saved in ANSI encoding.

[Launch]
CrashRecovery=0
RunAsAdmin=1
LauncherName=StrokeIt MIIIME Launcher
AppName=StrokeIt
ExeName=strokeit.exe
ExeName64=strokeit.exe
UniqueMutex=StrokeIt_MIIIME_Mutex
AllowMultipleInstances=1
WorkDir=
PreRun=
PostRun=

[Directories]
RunPath=App\StrokeIt
RawDataPath=App\RawDat
ExtPath=App\Ext
DataPath=Dat

[Options]
UseJunction=1
FreezeMode=0
DetectReadOnly=0
LogLevel=0
AddCommand=

[Registry]
01=HKEY_CURRENT_USER\Software\TCB Networks\StrokeIt\

[RegistryRoot]
01=HKEY_CURRENT_USER\Software\TCB Networks\

[RegistryFix]
SmartSkip=1
01=HKEY_CURRENT_USER\Software\TCB Networks\StrokeIt|GesturesDir|{Roaming}\TCB Networks\strokeit\Gestures\
02=HKEY_CURRENT_USER\Software\TCB Networks\StrokeIt|ActionsDir|{Roaming}\TCB Networks\strokeit\Actions\

[Resources]
SmartSkip=1
FolderIcon=Folder.ico
;Splash=Splash.png
;SplashDuration=1500

[Advanced]
RetryLimit=10
RetryDelay=50
CleanupWait=50
ProcessCheckInterval=200
UserFileBlacklist=|AppData|Desktop|Documents|Downloads|Favorites|Links|Music|Pictures|Saved Games|Searches|Videos|OneDrive|Dropbox|Google Drive|IntelGraphicsProfiles|.oracle_jre_usage|ntuser.dat|ntuser.dat.log1|ntuser.dat.log2|ntuser.ini|
CleanupFolderExclusions=|Microsoft|Windows|Packages|Boot|PerfLogs|
ExitThreshold=2
LogRotationSize=5242880
GuidTrimLen=1
MinOSBuild=0