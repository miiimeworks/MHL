; MIIIME Hybrid Launcher Configuration Guide
; ⓒ 2026 MIIIME

; 이 파일은 ANSI 인코딩으로 저장되어야 함.
; This file must be saved in ANSI encoding.

; ★ {Run}\Whisper 폴더는 업데이트시 항상 유지할 것. 
; ★ The {Run}\Whisper folder should always be maintained when updating.

[Launch]
CrashRecovery=0
RunAsAdmin=0
LauncherName=SubtitleEdit MIIIME Launcher
AppName=SubtitleEdit
ExeName=SubtitleEdit.exe
ExeName64=
UniqueMutex=SubtitleEdit_MIIIME_Mutex
AllowMultipleInstances=0
WorkDir=
PreRun=
PostRun=

[Directories]
RunPath=App\SE
RawDataPath=App\RawDat
ExtPath=App\Ext
DataPath=Dat

[Environment]
;PATH01={Sys}\System32
;PATH02={Sys}\SysWOW64

[Options]
UseJunction=1
FreezeMode=0
DetectReadOnly=0
LogLevel=0
AddCommand=

[Registry]
01=HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Tracing\SubtitleEdit_RASAPI32
02=HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Tracing\SubtitleEdit_RASMANCS

[UserProfile]
Blacklist=|AppData|Desktop|Documents|Downloads|Favorites|Links|Music|Pictures|Saved Games|Searches|Videos|OneDrive|Dropbox|Google Drive|IntelGraphicsProfiles|.oracle_jre_usage|ntuser.dat|ntuser.dat.log1|ntuser.dat.log2|ntuser.ini|

[SysInjection]
SkipIfExists=1

[Resources]
SmartSkip=1
FolderIcon={Res}\Folder.ico
;Splash={Res}\Splash.png
;SplashDuration=1500

[Advanced]
RetryLimit=10
RetryDelay=50
CleanupWait=50
ProcessCheckInterval=200
SystemFolderExclusions=|Microsoft|Windows|Packages|Boot|PerfLogs|
CleanupFolderExclusions=|Microsoft|Windows|Packages|Boot|PerfLogs|
ExitThreshold=2
LogRotationSize=5242880
GuidTrimLen=1
MinOSBuild=0