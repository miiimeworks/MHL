; MIIIME Hybrid Launcher Configuration Guide
; ⓒ 2026 MIIIME

; 이 파일은 ANSI 인코딩으로 저장되어야 함.
; This file must be saved in ANSI encoding.

[Launch]
CrashRecovery=0
RunAsAdmin=0
LauncherName=XnViewMP Miime Launcher
AppName=XnViewMP
ExeName=xnviewmp.exe
ExeName64=xnviewmp.exe
UniqueMutex=XnViewMP_Miime_Mutex
AllowMultipleInstances=1
WorkDir=
PreRun=
PostRun=

[Directories]
RunPath=App\XnViewMP
RawDataPath=App\RawDat
ExtPath=App\Ext
DataPath=Dat

[Environment]
CommonFilesDir=..\CommonFiles
; 1. 시스템 PATH에 Ghostscript Bin 추가
PATH={CommonFiles}\Ghostscript\bin
; 2. Ghostscript 라이브러리 및 리소스 경로 지정 (필수)
GS_LIB={CommonFiles}\Ghostscript\bin;{CommonFiles}\Ghostscript\lib;{CommonFiles}\Ghostscript\Resource;{CommonFiles}\Ghostscript\Resource\fonts
; 3. DLL 파일 직접 지정 (PAL 방식 차용 - 64비트 파일명 확인 필수)
GS_DLL={CommonFiles}\Ghostscript\bin\gsdll64.dll
XNVIEW_GS_DLL={CommonFiles}\Ghostscript\bin\gsdll64.dll
XNVIEW_GS_LIB={CommonFiles}\Ghostscript\bin;{CommonFiles}\Ghostscript\lib;{CommonFiles}\Ghostscript\Resource;{CommonFiles}\Ghostscript\Resource\fonts

PATH01={Env}\System32
PATH02={Env}\SysWOW64

[Options]
UseJunction=0
FreezeMode=1
DetectReadOnly=0
LogLevel=0
AddCommand=

[ProcessWatch]
01=KCrashReporter_x64.exe
02=twain32.exe
03=exiftool.exe
04=perl.exe
05=bpgdec.exe
06=lepton.exe
07=packJPG.exe
08=texconv.exe

[Registry]
01=HKEY_CURRENT_USER\SOFTWARE\XnView\XnViewMP
02=HKEY_LOCAL_MACHINE\SOFTWARE\XnView\XnViewMP

[RegistryRoot]
01=HKEY_CURRENT_USER\SOFTWARE\XnView
02=HKEY_LOCAL_MACHINE\SOFTWARE\XnView

[Resources]
SmartSkip=1
FolderIcon=Folder.ico
;Splash=Splash.png
;SplashDuration=1500

[Advanced]
RetryLimit=10
RetryDelay=50
CleanupWait=50
ProcessCheckInterval=200
UserFileBlacklist=|AppData|Desktop|Documents|Downloads|Favorites|Links|Music|Pictures|Saved Games|Searches|Videos|OneDrive|Dropbox|Google Drive|IntelGraphicsProfiles|.oracle_jre_usage|ntuser.dat|ntuser.dat.log1|ntuser.dat.log2|ntuser.ini|
CleanupFolderExclusions=|Microsoft|Windows|Packages|Boot|PerfLogs|
ExitThreshold=2
LogRotationSize=5242880
GuidTrimLen=1
MinOSBuild=0