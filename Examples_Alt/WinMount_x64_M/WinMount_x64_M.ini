[Launch]
CrashRecovery=0
RunAsAdmin=1
LauncherName=WinMount MIIIME Launcher
AppName=WinMount
ExeName=WinMount.exe
ExeName64=
UniqueMutex=WinMount_MIIIME_Mutex
AllowMultipleInstances=0
WorkDir=
PreRun=
PostRun=

[Directories]
RunPath=App\WinMount
RawDataPath=App\RawDat
ExtPath=App\Ext
DataPath=Dat

[Options]
UseJunction=1
FreezeMode=0
DetectReadOnly=0
LogLevel=0
AddCommand=

[Registry]
01=HKEY_CURRENT_USER\Software\WinMount
02=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount.bin
03=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount.ccd
04=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount.cue
05=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount.img
06=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount.iso
07=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount.isz
08=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount.mdf
09=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount.mds
10=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount.mou
11=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount.nrg
12=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount.vcd
13=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount.wim
14=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount.wmt
15=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount.7z
16=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount.rar
17=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount.zip
18=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount_FileAsso.Origin
19=HKEY_CURRENT_USER\SOFTWARE\Classes\.7z
20=HKEY_CURRENT_USER\SOFTWARE\Classes\.rar
21=HKEY_CURRENT_USER\SOFTWARE\Classes\.zip
22=HKEY_CURRENT_USER\SOFTWARE\Microsoft\Windows\CurrentVersion\ApplicationAssociationToasts
23=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\*\shellex\ContextMenuHandlers\WinMTExt
24=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMTExt.DropShlExt
25=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMTExt.MouDropHandler
26=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMTExt.MouInfoExt
27=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMTExt.MountOverlayIcon
