29=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMTExt.MouThumbNailExt
30=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMTExt.ShlExtMenu
31=HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\WMDrive
32=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\.mou

[RegistryRoot]
;01=HKEY_LOCAL_MACHINE\SOFTWARE\Classes\WinMount_FileAsso.Origin

[CleanupDelete]
SmartSkip=0
01={Roaming}\WinMount

[UserProfile]
Blacklist=|AppData|Desktop|Documents|Downloads|Favorites|Links|Music|Pictures|Saved Games|Searches|Videos|OneDrive|Dropbox|Google Drive|IntelGraphicsProfiles|.oracle_jre_usage|ntuser.dat|ntuser.dat.log1|ntuser.dat.log2|ntuser.ini|

[SysInjection]
SkipIfExists=1
01=System32\drivers\WMDrive.sys|{System32}\drivers\WMDrive.sys

[Resources]
SmartSkip=1
FolderIcon={Res}\Folder.ico
;Splash={Res}\Splash.png
;SplashDuration=1500

[Advanced]
RetryLimit=10
RetryDelay=50
CleanupWait=50
ProcessCheckInterval=200
SystemFolderExclusions=|Microsoft|Windows|Packages|Boot|PerfLogs|
CleanupFolderExclusions=|Microsoft|Windows|Packages|Boot|PerfLogs|
ExitThreshold=2
LogRotationSize=5242880
GuidTrimLen=1
MinOSBuild=0