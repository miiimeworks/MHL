09=HKEY_LOCAL_MACHINE\SOFTWARE\ACD Systems\ACDSee|InTouchConfigRemind|EDEFJEGGGHCCFOPG230B1617
10=HKEY_LOCAL_MACHINE\SOFTWARE\ACD Systems\ACDSee|LicenseNumber|046183433933830541
