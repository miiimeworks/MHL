; MIIIME Hybrid Launcher Configuration Guide
; ЁП 2026 MIIIME

; АМ ЖДАПАә ANSI АОДЪөщАё·О АъАеөЗҫоҫЯ ЗФ.
; This file must be saved in ANSI encoding.

[Launch]
CrashRecovery=0
RunAsAdmin=0
LauncherName=ACDSee MIIIME Launcher
AppName=ACDSee
ExeName=ACDSee.exe
ExeName64=
UniqueMutex=ACDSee_MIIIME_Mutex
AllowMultipleInstances=1
WorkDir=
PreRun=
PostRun=

[Directories]
RunPath=App\ACDSee
RawDataPath=App\RawDat
ExtPath=App\Ext
DataPath=Dat

[Environment]
;PATH01={Sys}\System32
;PATH02={Sys}\SysWOW64

[Options]
UseJunction=0
FreezeMode=0
DetectReadOnly=0
LogLevel=0
AddCommand=

[ProcessWatch]
;01=updater.exe

[ProcessKill]
;01=crashpad_handler.exe

[Registry]
01=HKEY_CURRENT_USER\SOFTWARE\ACD Systems\ACDSee
02=HKEY_LOCAL_MACHINE\SOFTWARE\ACD Systems\ACDSee
03=HKEY_LOCAL_MACHINE\SOFTWARE\ACD Systems\ACDInTouch
04=HKEY_LOCAL_MACHINE\SOFTWARE\WOW6432Node\ACD Systems\PlugIns

[RegistryRoot]
01=HKEY_CURRENT_USER\SOFTWARE\ACD Systems
02=HKEY_LOCAL_MACHINE\SOFTWARE\ACD Systems
03=HKEY_LOCAL_MACHINE\SOFTWARE\WOW6432Node\ACD Systems

[RegistryFix]
SmartSkip=1

; =================================================================================================
; 1. »зҝлАЪ °ж·О јіБӨ (ұвБё)
; =================================================================================================
01=HKEY_CURRENT_USER\Software\ACD Systems\ACDSee|Favorites|{Run}\Favorites\
02=HKEY_CURRENT_USER\Software\ACD Systems\ACDSee|ImageDB|{Run}\ImageDB\ImageDB.ddf
03=HKEY_LOCAL_MACHINE\SOFTWARE\ACD Systems\PlugIns|PIFolder|{Run}\PlugIns\

; =================================================================================================
; 2. [БЯҝд] ¶уАМјұҪә №Ч №цАь БӨәё °ӯБҰ БЦАФ (јіДЎ ҝА·щ ЗШ°бҝл)
; * АМ БӨәё°Ў WOW6432NodeҝЎ ҫшАёёй ACDSeeҙВ јіДЎөЗБц ҫКАә °НАё·О °ЈБЦЗХҙПҙЩ.
; =================================================================================================

