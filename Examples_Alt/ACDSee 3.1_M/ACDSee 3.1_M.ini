[RegistryShell]
;01=Directory|ACDSee_Open|Open with ACDSee|"{Exe}" "%1"|"{Exe}"

[FileWrite]
SmartSkip=1
;01={Run}\ACDSee.ini|Settings|KEY:DefaultDirectory|{Run}

[CleanupExclude]
SmartSkip=2
;01={Dat}\profile\places.sqlite

[CleanupDelete]
SmartSkip=2
;01={Dat}\profile\startupCache

[Assets]
SmartSkip=1
01=*|{Run}

[Resources]
SmartSkip=1
FolderIcon=Folder.ico
;Splash=Splash.png
;SplashDuration=1500

[Advanced]
RetryLimit=10
RetryDelay=50
CleanupWait=50
ProcessCheckInterval=200
UserFileBlacklist=|AppData|Desktop|Documents|Downloads|Favorites|Links|Music|Pictures|Saved Games|Searches|Videos|OneDrive|Dropbox|Google Drive|IntelGraphicsProfiles|.oracle_jre_usage|ntuser.dat|ntuser.dat.log1|ntuser.dat.log2|ntuser.ini|
CleanupFolderExclusions=|Microsoft|Windows|Packages|Boot|PerfLogs|
ExitThreshold=2
LogRotationSize=5242880
GuidTrimLen=1
MinOSBuild=0