[Launch]
CrashRecovery=0
RunAsAdmin=0
LauncherName=TargetApp MIIIME Launcher
AppName=TargetApp
ExeName=TargetApp.exe
ExeName64=TargetApp64.exe
UniqueMutex=TargetApp_MIIIME_Mutex
AllowMultipleInstances=1
WorkDir=
PreRun=
PostRun=

[Directories]
RunPath=App\TargetApp
RawDataPath=App\RawDat
ExtPath=App\Ext
DataPath=Dat

[Environment]
;PATH01={Env}\System32
;PATH02={Env}\SysWOW64

[Options]
UseJunction=1
FreezeMode=0
DetectReadOnly=0
LogLevel=0
AddCommand=

[ProcessWatch]
;01=updater.exe

[ProcessKill]
;01=crashpad_handler.exe

[Registry]
;01=HKEY_CURRENT_USER\SOFTWARE\VendorName\TargetApp

[RegistryRoot]
;01=HKEY_CURRENT_USER\SOFTWARE\VendorName

[RegistryShell]
;01=Directory|TargetApp_Open|Open with TargetApp|"{Exe}" "%1"|"{Exe}"

[RegistryFix]
SmartSkip=1
;01=HKEY_CURRENT_USER\Software\VendorName\TargetApp|InstallPath|{Run}

[FileWrite]
SmartSkip=1
;01={Run}\TargetApp.ini|Settings|KEY:DefaultDirectory|{Run}

[CleanupExclude]
SmartSkip=2
;01={Dat}\profile\places.sqlite

[CleanupDelete]
SmartSkip=2
;01={Dat}\profile\startupCache

[Assets]
AlwaysUpdate=0
;01=*|{Run}

[UserFile]
SmartSkip=0
;01=Drivers\my_driver.sys|{System32}\drivers\my_driver.sys

[Resources]
SmartSkip=1
FolderIcon=Folder.ico
;Splash=Splash.png
;SplashDuration=1500

[Advanced]
RetryLimit=10
RetryDelay=50
CleanupWait=50
ProcessCheckInterval=200
UserFileBlacklist=|AppData|Desktop|Documents|Downloads|Favorites|Links|Music|Pictures|Saved Games|Searches|Videos|OneDrive|Dropbox|Google Drive|IntelGraphicsProfiles|.oracle_jre_usage|ntuser.dat|ntuser.dat.log1|ntuser.dat.log2|ntuser.ini|
CleanupFolderExclusions=|Microsoft|Windows|Packages|Boot|PerfLogs|
ExitThreshold=2
LogRotationSize=5242880
GuidTrimLen=1
MinOSBuild=0